version: '3.8'

services:
  aeo-intelligence:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: aeo-intelligence-platform
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=production
      - GOOGLE_PAGESPEED_API_KEY=${GOOGLE_PAGESPEED_API_KEY:-}
    volumes:
      - ./logs:/app/logs
    networks:
      - aeo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: aeo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - aeo-intelligence
    networks:
      - aeo-network

networks:
  aeo-network:
    driver: bridge

volumes:
  aeo-logs:
    driver: local